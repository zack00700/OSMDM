name: CI — Tests & Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Lancer les tests
        env:
          MDM_SECRET: ci-test-secret-key-for-github-actions
          MDM_CORS_ORIGINS: '*'
        run: |
          pytest tests/ -v --tb=short --cov=backend --cov-report=xml

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Vérification syntaxe
        run: |
          python -m py_compile backend/app.py
          python -m py_compile backend/maritime.py
          python -m py_compile backend/premium.py
          python -m py_compile frontend/server.py
          echo "✅ Tous les fichiers Python compilent correctement"