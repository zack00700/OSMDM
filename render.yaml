# ═══════════════════════════════════════════════════
# O.S MDM V2.1 — Configuration Render.com
# Placez ce fichier à la racine du repo GitHub
# ═══════════════════════════════════════════════════

services:
  - type: web
    name: osmdm-v2
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python start_render.py
    envVars:
      - key: MDM_SECRET
        generateValue: true
      - key: MDM_CORS_ORIGINS
        value: https://osmdm-v2.onrender.com
      - key: PYTHON_VERSION
        value: "3.11.0"
    healthCheckPath: /api/health
    plan: free
